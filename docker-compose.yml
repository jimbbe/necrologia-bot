services:
  proxy:
    image: caddy:2.8-alpine
    container_name: necrologia-bot-proxy
    restart: unless-stopped
    command: ["caddy", "reverse-proxy", "--from", "${FRONTEND_DOMAIN}", "--to", "app:3000"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

  app:
    image: jimbe01/necrologia-bot:3.0.0
    container_name: necrologia-bot
    restart: unless-stopped
    environment:
      FRONTEND_URL: ${FRONTEND_URL:-}
      BACKEND_URL: ${BACKEND_URL:-}
      XAI_API_KEY: ${XAI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-grok-4-1-fast}
      MAX_HISTORY: ${MAX_HISTORY:-30}
      AMC_USERNAME: ${AMC_USERNAME}
      AMC_PASSWORD: ${AMC_PASSWORD}
      AMC_BASE_URL: ${AMC_BASE_URL:-https://www.amcannunci.it}
      SESSION_TIMEOUT_MS: ${SESSION_TIMEOUT_MS:-1800000}
      DRY_RUN: ${DRY_RUN:-false}
      PREVIEW_ONLY: ${PREVIEW_ONLY:-false}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_HOST: ${ADMIN_HOST:-0.0.0.0}
      ADMIN_PORT: ${ADMIN_PORT:-3000}
    expose:
      - "3000"
    volumes:
      - ./data:/app/data
    mem_limit: 1536m
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  caddy_data:
  caddy_config:
